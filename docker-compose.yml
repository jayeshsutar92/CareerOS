services:
  frontend:
    build:
      context: ./frontend
      target: runner
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - careeros

  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/careeros
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - careeros

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      target: dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend-dev:
        condition: service_started
    networks:
      - careeros

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./backend
      target: builder
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@postgres:5432/careeros
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - careeros

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: careeros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d careeros"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - careeros

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careeros

networks:
  careeros:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  frontend_next:
  backend_venv: